const SK = "fm_quotes_v2";
function loadQuotes() {
  try { const r=JSON.parse(localStorage.getItem(SK)||"[]"); return Array.isArray(r)?r:[]; }
  catch { return []; }
}
function saveQuotes(qs) {
  try { localStorage.setItem(SK,JSON.stringify(qs)); return true; }
  catch { return false; }
}

function downloadPdf(q) {
  const content = buildPrintHtml(q);
  const blob    = new Blob([content],{type:"text/html"});
  const url     = URL.createObjectURL(blob);
  // iOS Safari doesn't support blob downloads — open in new tab instead.
  // User can then tap Share → Print → Save as PDF.
  const win = window.open(url, "_blank");
  if (!win) {
    // Pop-up blocked fallback: try direct link
    const a    = document.createElement("a");
    a.href     = url;
    a.target   = "_blank";
    a.rel      = "noopener";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
  setTimeout(()=>URL.revokeObjectURL(url), 8000);
}

/* ── Toast ── */
function Toast({msg,ok}) {
  if (!msg) return null;
  return <div style={{position:"fixed",bottom:32,left:"50%",transform:"translateX(-50%)",
    background:ok?"#10b981":"#ef4444",color:"#fff",padding:"11px 22px",borderRadius:10,
    fontSize:14,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.35)",
    whiteSpace:"nowrap",pointerEvents:"none"}}>{msg}</div>;
}

/* ── LIST ── */
function ListScreen({onNew, onOpen}) {
  const [quotes,setQ] = useState([]);
  const [toast,setT]  = useState(null);
  const toast2 = (m,ok=true) => { setT({m,ok}); setTimeout(()=>setT(null),2200); };

  useEffect(()=>{ setQ(loadQuotes().sort((a,b)=>b.createdAt.localeCompare(a.createdAt))); },[]);

  function del(e,id) {
    e.stopPropagation();
    if (!window.confirm("¿Eliminar esta cotización?")) return;
    const updated = loadQuotes().filter(q=>q.id!==id);
    saveQuotes(updated); setQ(updated); toast2("Eliminada");
  }

  return (
    <div style={{padding:"16px",maxWidth:500,margin:"0 auto"}}>
      {toast && <Toast msg={toast.m} ok={toast.ok}/>}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,gap:10}}>
        <span style={{color:"#888",fontSize:14}}>{quotes.length} cotización{quotes.length!==1?"es":""}</span>
        <button style={{...BTN,...G,padding:"13px 22px",fontSize:16}} onClick={onNew}>+ Nueva</button>
      </div>

      {quotes.length===0 && (
        <div style={{textAlign:"center",padding:"60px 20px"}}>
          <div style={{fontSize:52,marginBottom:14}}>📄</div>
          <div style={{fontSize:16,color:"#999",marginBottom:6}}>Sin cotizaciones guardadas</div>
          <div style={{fontSize:14,color:"#666"}}>Tocá "+ Nueva" para empezar</div>
        </div>
      )}

      {quotes.map(q=>{
        const s = sub(q.rows||[]);
        const t = s*(q.iva?1.13:1);
        const svcs = (q.rows||[]).map(r=>r.preset==="Otro..."?r.custom:r.preset).filter(Boolean).slice(0,3).join(" · ");
        return (
          <div key={q.id} onClick={()=>onOpen(q)}
            style={{background:"#fff",borderRadius:14,padding:"18px",marginBottom:12,
              boxShadow:"0 2px 14px rgba(0,0,0,.22)",cursor:"pointer",
              borderLeft:"4px solid #C9A84C"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:17,color:"#111",marginBottom:3,
                  overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                  {q.client?.name||"Cliente sin nombre"}
                </div>
                <div style={{fontSize:13,color:"#aaa",marginBottom:6}}>{q.date}</div>
                <div style={{fontSize:13,color:"#888",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{svcs}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontWeight:800,fontSize:18,color:"#9B7B2A"}}>{C}{fmt(t)}</div>
                <div style={{fontSize:12,color:"#bbb",marginBottom:10}}>{q.iva?"IVA incl.":"Sin IVA"}</div>
                <button onClick={e=>del(e,q.id)}
                  style={{...BTN,background:"transparent",border:"1px solid #fca5a5",color:"#ef4444",padding:"6px 12px",fontSize:13,borderRadius:8}}>
                  Eliminar
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

  const [edit,setEd]  = useState(true);
  const [sav, setSav] = useState(false);
  const [toast,setT]  = useState(null);
  const toast2 = (m,ok=true) => { setT({m,ok}); setTimeout(()=>setT(null),2400); };

  const updCo = f => setQ(p=>({...p,company:{...p.company,...f}}));
  const updCl = f => setQ(p=>({...p,client:{...p.client,...f}}));
  const updR  = (id,f,v) => setQ(p=>({...p,rows:p.rows.map(r=>r.id===id?{...r,[f]:v}:r)}));
  const addR  = ()        => setQ(p=>({...p,rows:[...p.rows,nr()]}));
  const rmR   = id        => setQ(p=>({...p,rows:p.rows.filter(r=>r.id!==id)}));

  const s   = sub(q.rows);
  const iv  = q.iva ? s*0.13 : 0;
  const tot = s+iv;

  function save() {
    setSav(true);
    const all = loadQuotes();
    const idx = all.findIndex(x=>x.id===q.id);
    const upd = {...q, updatedAt:new Date().toISOString()};
    if (idx>=0) all[idx]=upd; else all.unshift(upd);
    const ok = saveQuotes(all);
    setSav(false);
    toast2(ok?"✓ Guardado":"Error al guardar",ok);
  }

  function handlePdf() {
    try { downloadPdf(q); toast2("✓ En la nueva pestaña: Compartir → Imprimir → PDF"); }
    catch(e){ toast2("Error: "+e.message,false); }
  }

            {edit
              ?<div style={{display:"flex",alignItems:"center",gap:10}}>
                <div onClick={()=>setQ(p=>({...p,iva:!p.iva}))}
                  style={{width:46,height:26,borderRadius:13,background:q.iva?"#C9A84C":"#ccc",
                    position:"relative",cursor:"pointer",transition:"background .2s",flexShrink:0}}>
                  <div style={{position:"absolute",width:20,height:20,background:"#fff",borderRadius:"50%",
                    top:3,left:q.iva?23:3,transition:"left .2s",boxShadow:"0 1px 4px rgba(0,0,0,.25)"}}/>
                </div>
                <span style={{fontSize:14,color:q.iva?"#9B7B2A":"#aaa",fontWeight:600}}>
                  {q.iva?"Aplica":"No aplica"}
                </span>
              </div>
              :<span style={{fontWeight:600}}>{q.iva?C+fmt(iv):"—"}</span>}
          </div>
          {q.iva && <div style={{display:"flex",justifyContent:"space-between",padding:"13px 18px",
            borderBottom:"1px solid #f0ebe0",fontSize:15}}>
            <span style={{color:"#888"}}>Monto IVA</span>
            <span style={{fontWeight:600}}>{C}{fmt(iv)}</span>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",padding:"16px 18px",background:"#0d0d0d"}}>
            {["TOTAL",C+fmt(tot)].map((t,i)=>(
              <span key={i} style={{fontWeight:800,fontSize:18,
                background:"linear-gradient(90deg,#E4C76B,#C9A84C)",
                WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{t}</span>
            ))}
          </div>
        </div>

        {/* NOTES */}
        <span style={LBL}>Notas y condiciones</span>
        <textarea value={q.notes} onChange={e=>setQ(p=>({...p,notes:e.target.value}))}
          disabled={!edit} rows={3} placeholder="Condiciones de pago, vigencia…"
          style={{width:"100%",border:"1.5px solid",borderColor:edit?"#e0d8c8":"transparent",
            borderRadius:10,padding:"12px 14px",fontSize:15,color:"#444",resize:"none",
            outline:"none",fontFamily:"inherit",background:"#fdfaf4"}}/>

        {/* FOOTER STRIP */}
        <div style={{marginTop:16,background:"#0d0d0d",borderRadius:12,padding:"13px 18px",
          display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <img src={LOGO} alt="FM" style={{height:22,opacity:.6}}/>
          <span style={{fontSize:11,color:"rgba(255,255,255,.3)"}}>{q.company.email}</span>
        </div>
      </div>
    </div>
  );
}

/* ── ROOT ── */
function App() {
  const [view,setV]  = useState("list");
  const [cur, setCur]= useState(null);
  const [tick,setTk] = useState(0);

  return (
    <div style={{minHeight:"100vh",background:"#181818"}}>
      {/* STICKY TOP BAR */}
      <div style={{background:"#0d0d0d",padding:"12px 16px",display:"flex",alignItems:"center",
        gap:10,borderBottom:"1px solid #2a2a2a",position:"sticky",top:0,zIndex:100}}>
        {view==="edit" && (
          <button onClick={()=>{setV("list");setCur(null);setTk(t=>t+1);}}
            style={{background:"none",border:"none",color:"#C9A84C",fontSize:22,cursor:"pointer",lineHeight:1,padding:"2px 6px"}}>
            ←
          </button>
        )}
        <img src={LOGO} alt="Focus Media" style={{height:30,objectFit:"contain"}}/>
        <span style={{flex:1,fontWeight:700,fontSize:15,color:"#E4C76B",marginLeft:4}}>
          {view==="list"?"Cotizaciones":"Nueva cotización"}
        </span>
      </div>

      {view==="list" && <ListScreen key={tick}
        onNew={()=>{ setCur(null); setV("edit"); }}
        onOpen={q=>{ setCur(q); setV("edit"); }}/>}
      {view==="edit" && <QuoteScreen initial={cur}
        onBack={()=>{ setV("list"); setCur(null); setTk(t=>t+1); }}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
